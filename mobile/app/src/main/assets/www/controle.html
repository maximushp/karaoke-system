<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karaokê Controle</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --pink: #ff2d78; --blue: #00d4ff; --dark: #0d0d15; --card: #1e1e2e; --border: #ffffff14; }
  body { background: var(--dark); color: #fff; font-family: 'Nunito', sans-serif; min-height: 100vh; padding-bottom: 30px; }

  header { background: linear-gradient(135deg, #1a0030, #001a30); padding: 20px 20px 14px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 5px; background: linear-gradient(90deg, var(--pink), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  header p { font-size: .75rem; opacity: .35; margin-top: 2px; }

  .search-wrap { padding: 14px 16px; position: sticky; top: 68px; z-index: 90; background: var(--dark); border-bottom: 1px solid var(--border); }
  .search-inner { display: flex; align-items: center; background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; transition: border .2s; }
  .search-inner:focus-within { border-color: var(--pink); box-shadow: 0 0 0 3px #ff2d7820; }
  .search-inner span { padding: 0 14px; font-size: 1.1rem; opacity: .5; }
  #search { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-family: 'Nunito', sans-serif; font-size: 1rem; padding: 14px 4px 14px 0; }
  #search::placeholder { opacity: .35; }
  #clear-btn { background: none; border: none; color: #fff; font-size: 1.1rem; padding: 0 14px; cursor: pointer; opacity: .4; display: none; }



  .tabs { display: flex; gap: 8px; padding: 12px 16px 0; }
  .tab { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: #fff; font-family: 'Nunito', sans-serif; font-size: .85rem; font-weight: 700; cursor: pointer; transition: all .2s; text-align: center; }
  .tab.active { background: linear-gradient(135deg, var(--pink), #a000ff); border-color: transparent; }

  #section-busca, #section-fila { padding: 12px 16px; }

  #loading { text-align: center; padding: 30px; opacity: .4; font-size: .9rem; display: none; }
  .fonte-badge { font-size: .72rem; opacity: .4; text-align: center; padding: 6px 0 4px; }

  #load-more-btn { display: none; width: 100%; margin-top: 10px; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: #fff; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .9rem; cursor: pointer; transition: all .2s; }
  #load-more-btn:hover { border-color: var(--pink); }
  #load-more-btn:active { transform: scale(.98); }
  #load-more-btn:disabled { opacity: .4; cursor: default; }

  .video-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 10px; overflow: hidden; display: flex; align-items: center; transition: border .2s; }
  .video-card:hover { border-color: #ffffff30; }
  .video-card img { width: 100px; height: 65px; object-fit: cover; flex-shrink: 0; }
  .video-info { flex: 1; padding: 8px 10px; min-width: 0; }
  .video-info p { font-size: .82rem; font-weight: 700; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .add-btn { background: linear-gradient(135deg, var(--pink), #a000ff); border: none; color: #fff; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: .85rem; padding: 8px 12px; border-radius: 10px; cursor: pointer; margin-right: 10px; flex-shrink: 0; transition: transform .1s, opacity .2s; white-space: nowrap; }
  .add-btn:active { transform: scale(.95); }
  .add-btn:disabled { opacity: .4; cursor: default; }

  .fila-controls { display: flex; gap: 8px; margin-bottom: 14px; }
  .ctrl-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: #fff; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .85rem; cursor: pointer; transition: all .15s; }
  .ctrl-btn:active { transform: scale(.97); }
  .ctrl-btn.danger  { border-color: #ff2d7844; color: var(--pink); }
  .ctrl-btn.primary { border-color: #00d4ff44; color: var(--blue); }

  .fila-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
  .fila-item.first { border-color: var(--pink); background: #ff2d7810; }
  .fila-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; opacity: .3; width: 22px; flex-shrink: 0; }
  .fila-item.first .fila-num { opacity: 1; color: var(--pink); }
  .fila-titulo { font-size: .85rem; font-weight: 700; flex: 1; line-height: 1.3; }
  .fila-icon   { font-size: 1rem; flex-shrink: 0; }
  .fila-vazia { text-align: center; padding: 50px 20px; opacity: .3; }

  .stop-btn { display: block; width: calc(100% - 32px); margin: 0 16px 16px; padding: 13px; border-radius: 12px; border: 1px solid #ff2d7844; background: transparent; color: var(--pink); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .9rem; cursor: pointer; transition: all .2s; }
  .stop-btn:active { background: #ff2d7820; transform: scale(.98); }
  .fila-vazia .big { font-size: 3rem; }
  .fila-vazia p { margin-top: 8px; font-size: .9rem; }

  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1e1e2e; border: 1px solid #ffffff20; color: #fff; padding: 12px 22px; border-radius: 50px; font-size: .9rem; font-weight: 700; opacity: 0; transition: all .3s; pointer-events: none; white-space: nowrap; z-index: 999; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <h1>🎤 KARAOKÊ</h1>
  <p>Controle remoto</p>
  <p style="font-size:.75rem;margin-top:4px;opacity:.5">📺 Assistir na TV: <a id="server-ip" href="#" style="color:var(--blue);text-decoration:none">carregando...</a></p>
</header>

<div class="search-wrap">
  <div class="search-inner">
    <span>🔍</span>
    <input id="search" type="text" placeholder="Buscar música..." oninput="buscar()" autocomplete="off">
    <button id="clear-btn" onclick="limparBusca()">✕</button>
  </div>
</div>



<div class="tabs">
  <button class="tab active" onclick="trocarTab('busca', this)">🔎 Busca</button>
  <button class="tab" onclick="trocarTab('fila', this)">📋 Fila</button>
</div>

<div id="section-busca">
  <div id="loading">🎵 Buscando...</div>
  <div id="results"></div>
  <button id="load-more-btn" onclick="carregarMais()">⬇️ Carregar mais resultados</button>
</div>

<div id="section-fila" style="display:none;">
  <div class="fila-controls">
    <button class="ctrl-btn primary" onclick="pular()">⏭ Pular música</button>
    <button class="ctrl-btn danger"  onclick="limparFila()">🗑 Limpar fila</button>
  </div>
  <div id="fila-display"></div>
</div>

<button class="stop-btn" onclick="pararServidor()">⏹ Parar servidor</button>
<div id="toast"></div>

<script>
  // Buscar IP do servidor
  async function carregarIp() {
    try {
      const res = await fetch("/api/ip");
      const data = await res.json();
      const el = document.getElementById("server-ip");
      if (data.ip && data.ip !== "?") {
        const url = "http://" + data.ip + ":3000/tv";
        el.textContent = data.ip + ":3000/tv";
        el.href = url;
      } else {
        el.textContent = "IP indisponível";
      }
    } catch { document.getElementById("server-ip").textContent = "IP indisponível"; }
  }
  carregarIp();

  let timeout;
  let tabAtual  = "busca";
  let continuationToken = null;
  let termoAtual = "";

  // ── TABS ──────────────────────────────────────────────────────
  function trocarTab(tab, btn) {
    tabAtual = tab;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("section-busca").style.display = tab === "busca" ? "block" : "none";
    document.getElementById("section-fila").style.display  = tab === "fila"  ? "block" : "none";
    if (tab === "fila") carregarFila();
  }

  // ── BUSCA ─────────────────────────────────────────────────────
  function buscar() {
    clearTimeout(timeout);
    const termo = document.getElementById("search").value.trim();
    document.getElementById("clear-btn").style.display = termo ? "block" : "none";

    if (termo.length < 2) {
      document.getElementById("results").innerHTML = "";
      document.getElementById("loading").style.display = "none";
      document.getElementById("load-more-btn").style.display = "none";
      continuationToken = null;
      return;
    }

    document.getElementById("loading").style.display = "block";
    document.getElementById("results").innerHTML = "";
    document.getElementById("load-more-btn").style.display = "none";
    continuationToken = null;
    totalEncontrados = 0;

    timeout = setTimeout(() => executarBusca(termo, false), 500);
  }

  async function executarBusca(termo, append) {
    termoAtual = termo;
    try {
      const payload = append && continuationToken
        ? { continuationToken }
        : { query: termo };

      const res = await fetch("/api/busca", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (!res.ok) throw new Error("Servidor retornou " + res.status);
      const data = await res.json();

      document.getElementById("loading").style.display = "none";

      if (data.erro) {
        if (!append) document.getElementById("results").innerHTML =
          `<p style="text-align:center;opacity:.4;padding:20px">Erro: ${data.erro}</p>`;
        return;
      }

      const itens = data.itens || [];
      continuationToken = data.nextToken || null;

      document.getElementById("load-more-btn").style.display = continuationToken ? "block" : "none";

      renderResultados(itens, append);

    } catch (e) {
      document.getElementById("loading").style.display = "none";
      if (!append) document.getElementById("results").innerHTML =
        '<p style="text-align:center;opacity:.4;padding:20px">Erro na busca. Tente novamente.</p>';
    }
  }

  // ── CARREGAR MAIS ─────────────────────────────────────────────
  async function carregarMais() {
    if (!continuationToken) return;
    const btn = document.getElementById("load-more-btn");
    btn.disabled = true;
    btn.textContent = "⏳ Carregando...";
    await executarBusca(termoAtual, true);
    btn.disabled = false;
    btn.textContent = "⬇️ Carregar mais resultados";
  }

  // ── RENDER ────────────────────────────────────────────────────
  function renderResultados(itens, append) {
    const div = document.getElementById("results");
    if (!append) div.innerHTML = "";

    if (!append && itens.length === 0) {
      div.innerHTML = '<p style="text-align:center;opacity:.4;padding:20px">Nenhum resultado encontrado</p>';
      return;
    }

    if (!append) {
      const badge = document.createElement("p");
      badge.className = "fonte-badge";
      badge.textContent = `🌐 ${itens.length} resultados`;
      div.appendChild(badge);
    }

    itens.forEach(v => {
      const el = document.createElement("div");
      el.className = "video-card";
      const tituloSafe = v.titulo.replace(/\\/g, "\\\\").replace(/'/g, "\\'");
      const thumb = v.thumb || `https://i.ytimg.com/vi/${v.id}/mqdefault.jpg`;
      el.innerHTML = `
        <img src="${thumb}" loading="lazy" onerror="this.src='https://i.ytimg.com/vi/${v.id}/mqdefault.jpg'">
        <div class="video-info"><p>${v.titulo}</p></div>
        <button class="add-btn" onclick="add('${v.id}','${tituloSafe}',this)">➕ Add</button>
      `;
      div.appendChild(el);
    });
  }

  function limparBusca() {
    document.getElementById("search").value = "";
    document.getElementById("results").innerHTML = "";
    document.getElementById("clear-btn").style.display = "none";
    document.getElementById("load-more-btn").style.display = "none";
    continuationToken = null;
    document.getElementById("search").focus();
  }

  // ── ADD ───────────────────────────────────────────────────────
  async function add(id, titulo, btn) {
    btn.disabled = true;
    btn.textContent = "✓";
    try {
      await fetch("/fila", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, titulo })
      });
      toast("✅ Adicionada à fila!");
    } catch {
      toast("❌ Erro ao adicionar");
      btn.disabled = false;
      btn.textContent = "➕ Add";
    }
  }

  // ── FILA ──────────────────────────────────────────────────────
  async function carregarFila() {
    try {
      const res  = await fetch("/fila");
      const fila = await res.json();
      const div  = document.getElementById("fila-display");

      if (fila.length === 0) {
        div.innerHTML = '<div class="fila-vazia"><div class="big">🎵</div><p>Fila vazia</p></div>';
        return;
      }

      div.innerHTML = "";
      fila.forEach((m, i) => {
        const el = document.createElement("div");
        el.className = "fila-item" + (i === 0 ? " first" : "");
        el.innerHTML = `
          <div class="fila-num">${i + 1}</div>
          <div class="fila-titulo">${m.titulo}</div>
          <div class="fila-icon">${i === 0 ? "🎤" : "🎵"}</div>
        `;
        div.appendChild(el);
      });
    } catch {
      toast("Erro ao carregar fila");
    }
  }

  setInterval(() => { if (tabAtual === "fila") carregarFila(); }, 3000);

  async function pular() {
    if (!confirm("Pular a música atual?")) return;
    await fetch("/fila/primeira", { method: "DELETE" });
    toast("⏭ Pulando...");
    carregarFila();
  }

  async function limparFila() {
    if (!confirm("Limpar toda a fila?")) return;
    await fetch("/fila", { method: "DELETE" });
    toast("🗑 Fila limpa!");
    carregarFila();
  }

  async function pararServidor() {
    if (!confirm("Parar o servidor? O app vai fechar.")) return;
    try {
      await fetch("/api/parar", { method: "POST" });
    } catch {}
    toast("⏹ Servidor encerrado");
  }

  function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  }
</script>
</body>
</html>
